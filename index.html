<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherScope</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">

            <a href="index.html" class="logo">
                <!--logo-->
                <img src="images/logo.png" alt="Logo WeatherScope">
                <h1>WeatherScope</h1>
            </a>

            <div class="navigation">
                <!--Menu-->
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Accueil</a></li>
                    <li><a href="carte.html">Carte</a></li>
                    <li><a href="previsions.html">Prévisions</a></li>
                    <li><a href="favoris.html">Favoris</a></li>
                    <li><a href="alerte.html">Alertes</a></li>
                    <li><a href="a_propos.html">À propos</a></li>
                </ul>
            </div>

            <div class="right-side">

            <div class="search">
                <!--bare recherche-->
                <form>
                <input type="search" placeholder="Rechercher une ville...">
                <img src="images/search.svg" alt="Rechercher">
                </form>
            </div>

            <div class="settings">
                <img src="images/settings.svg" alt="Parametres">
            </div>

            <div class="profile">
                <img src="images/profile.svg" alt="profile">
            </div>

            </div>
        </nav>
    </header>
    <main>
        <section class="hero">

            <div class="hero-left">
            <div class="hero-top">
                <div class="hero-header">
                    <div class="title">
                        <img src="images/localisation.svg" alt="icon de prosition">
                        <h2>Météo actuelle</h2>
                    </div>
                    <div class="current-location">
                    <img src="images/localisation.svg" alt="position actuelle">
                    <p id="location">Ma position actuelle</p>
                    </div>
                </div>

                <div class="search-weather">
                    <form>
                        <input type="search" placeholder="Rechercher une ville ...">
                        <img src="images/icon_recherche.svg" alt="Rechercher">
                    </form>
                </div>
            </div>

                <div class="weather-card">
                    <div class="weather-main">
                        <img id="weather_icon" src="images/logo.png" alt="icon_meteo">
                        <div class="weather-info">
                            <h1 id="temperature">24°C</h1>
                            <p id="description">Ciel dégagé</p>
                            <p id="city">Angers, France</p>
                        </div>
                    </div>
                    <div class="weather-details">
                    <div class="detail">
                        <span>Humidité</span>
                        <p id="humidity"></p>
                    </div>

                    <div class="detail">
                        <span>Vent</span>
                        <p id="wind"></p>
                    </div>

                    <div class="detail">
                        <span>Pression</span>
                        <p id="pressure"></p>
                    </div>

                    <div class="detail">
                        <span>Ressenti</span>
                        <p id="feels-like"></p>
                    </div>

                </div>

                </div>

                

            </div>



            
            <div class="hero-right">
            </div>
        </section>
    </main>
</body>
</html>
